version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: saas_whatsapp_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: saas_whatsapp
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - saas_network

  redis:
    image: redis:7-alpine
    container_name: saas_whatsapp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - saas_network

volumes:
  mysql_data:
  redis_data:

networks:
  saas_network:
    driver: bridge
